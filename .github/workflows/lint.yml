name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: Cache swift-format
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/swift-format
          key: ${{ runner.os }}-swift-format

      - name: Install swift-format
        run: |
          if ! command -v swift-format &> /dev/null; then
            git clone --depth 1 --branch swift-5.9-branch https://github.com/apple/swift-format.git /tmp/swift-format
            cd /tmp/swift-format
            swift build -c release
            cp .build/release/swift-format /usr/local/bin/
          fi

      - name: Run swift-format lint
        run: swift-format lint --configuration .swift-format --recursive Sources/
