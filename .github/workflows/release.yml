name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -n "$XCODE_PATH" ]; then
            echo "Using Xcode: $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          fi
          xcodebuild -version
          swift --version

      - uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build .app bundle
        env:
          VERSION: ${{ github.ref_name }}
        run: ./scripts/build-app.sh

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: ./scripts/create-dmg.sh

      - name: Package .app into zip
        run: cd .build/release && zip -r BearTodoMenuBar.zip BearTodoMenuBar.app

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            .build/release/BearTodoMenuBar.zip
            .build/release/BearTodoMenuBar.dmg
          generate_release_notes: true

      - name: Trigger tap repo update
        env:
          GH_TOKEN: ${{ secrets.TAP_REPO_PAT }}
        run: |
          gh workflow run update-cask.yml \
            --repo ECHOUniverse/homebrew-bear-tap \
            --ref main \
            --field version="${{ github.ref_name }}"
